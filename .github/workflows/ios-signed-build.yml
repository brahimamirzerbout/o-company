name: iOS signed build (TestFlight)

on:
  push:
    tags:
      - "v*.*.*"  # any v-tag (v1.0.0, v1.2.3, etc.)
  workflow_dispatch:    # manual trigger for ad-hoc builds

# This workflow builds a signed .ipa and uploads to TestFlight.
# It requires the following GitHub Actions secrets to be set:
#   APPLE_TEAM_ID              - The Apple Developer Team ID
#   APP_STORE_CONNECT_API_KEY  - The .p8 file contents (App Store Connect API key)
#   APP_STORE_CONNECT_API_ISSUER - The issuer ID for the API key
#   APPLE_CERT_P12             - Base64-encoded .p12 distribution certificate
#   APPLE_CERT_PASSWORD        - Password for the .p12
#   APPLE_PROVISIONING_PROFILE - Base64-encoded provisioning profile
#
# The secrets are set in Settings → Secrets and variables → Actions.
# The cert is a one-time setup; the .p12 is exported from Keychain
# Access (Keychain Access → My Certificates → Export → .p12).
#
# The .p12 and provisioning profile are base64-encoded because
# GitHub secrets must be strings. The workflow decodes them
# into files in the runner's filesystem, imports the cert into
# a temporary keychain, builds, and tears down.

jobs:
  build-ios-signed:
    name: iOS signed build (TestFlight upload)
    runs-on: macos-14
    timeout-minutes: 45
    permissions:
      contents: write  # needed for tag pushes
      id-token: write  # needed for attestation if using OIDC
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.0.app

      - name: Install xcodegen
        run: brew install xcodegen

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Regenerate Xcode project
        working-directory: apps/ios
        run: xcodegen generate

      - name: Decode secrets to files
        # Decode the base64-encoded cert, profile, and API key into
        # files in the runner's filesystem. The runner is ephemeral;
        # the files are deleted when the job ends.
        run: |
          set -euo pipefail
          echo "${{ secrets.APPLE_CERT_P12 }}" | base64 --decode > /tmp/cert.p12
          echo "${{ secrets.APPLE_PROVISIONING_PROFILE }}" | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          ls -la /tmp/cert.p12 /tmp/profile.mobileprovision ~/private_keys/

      - name: Create temporary keychain and import cert
        # macOS keychain manipulation. The runner's login keychain
        # is locked; we create a temp keychain, unlock it, import
        # the cert, and tell xcodebuild to use it.
        run: |
          set -euo pipefail
          KEYCHAIN_PATH=/tmp/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 24)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.APPLE_CERT_PASSWORD }}" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Install provisioning profile
        # Copy the .mobileprovision to the standard location Xcode
        # looks for. The UUID is in the profile itself; we extract it.
        run: |
          set -euo pipefail
          PROFILE_PATH=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILE_PATH"
          UUID=$(grep -a UUID /tmp/profile.mobileprovision | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          echo "Profile UUID: $UUID"
          cp /tmp/profile.mobileprovision "$PROFILE_PATH/$UUID.mobileprovision"

      - name: Build archive (signed)
        working-directory: apps/ios
        run: |
          set -euo pipefail
          xcodebuild \
            -project Noira.xcodeproj \
            -scheme Noira \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Noira.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="o-company-ios" \
            archive

      - name: Export .ipa
        working-directory: apps/ios
        run: |
          set -euo pipefail
          # Edit the ExportOptions.plist with the real team ID at
          # build time. The placeholder is in the repo.
          sed -i.bak "s/TEAM_ID_HERE/${{ secrets.APPLE_TEAM_ID }}/g" ExportOptions.plist

          xcodebuild \
            -exportArchive \
            -archivePath build/Noira.xcarchive \
            -exportPath build/Export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates

          ls -la build/Export/

      - name: Upload to TestFlight
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        working-directory: apps/ios
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          set -euo pipefail
          IPA=$(ls build/Export/*.ipa | head -1)
          echo "Uploading $IPA"
          xcrun altool --upload-app --type ios --file "$IPA" \
            --apiKey "$APP_STORE_CONNECT_API_KEY" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_API_ISSUER }}"

      - name: Upload .ipa as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-signed-ipa
          path: apps/ios/build/Export/*.ipa
          if-no-files-found: error

      - name: Cleanup keychain
        # Always run, even on failure. The keychain has the cert
        # in plaintext; we want it gone when the runner shuts down.
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f /tmp/cert.p12 /tmp/profile.mobileprovision
          rm -rf ~/private_keys
